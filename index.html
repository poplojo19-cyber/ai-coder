<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OpenClaw Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(75, 85, 99, 0.3); }
        .neon-glow { text-shadow: 0 0 10px rgba(59, 130, 246, 0.5); }
    </style>
</head>
<body class="bg-[#050505] text-gray-200 min-h-screen font-sans antialiased flex flex-col items-center justify-center p-4">

    <!-- Glowing Background Decor -->
    <div class="fixed top-[-10%] left-[-10%] w-[40%] h-[40%] bg-blue-900/20 rounded-full blur-[120px] -z-10"></div>
    <div class="fixed bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-purple-900/20 rounded-full blur-[120px] -z-10"></div>

    <div class="w-full max-w-xl space-y-6">
        <!-- Header -->
        <header class="flex items-center justify-between px-2">
            <div class="flex items-center gap-2">
                <div class="w-2 h-2 bg-blue-500 rounded-full animate-pulse shadow-[0_0_10px_rgba(59,130,246,1)]"></div>
                <h1 class="text-xl font-mono tracking-widest uppercase text-blue-400 neon-glow font-bold">OpenClaw v4</h1>
            </div>
            <span class="text-[10px] text-gray-500 font-mono uppercase tracking-widest">Autonomous Engineer</span>
        </header>

        <!-- Main Terminal UI -->
        <main class="glass rounded-3xl p-6 shadow-2xl space-y-4">
            <div class="space-y-2">
                <label class="text-[10px] text-gray-500 uppercase font-bold tracking-widest ml-1">Task Input</label>
                <textarea id="promptInput" rows="4" 
                    class="w-full bg-black/40 border border-gray-800 rounded-2xl p-4 text-sm focus:outline-none focus:border-blue-500/50 transition-all resize-none placeholder:text-gray-700"
                    placeholder="Describe the feature or change you want..."></textarea>
            </div>

            <button id="runBtn" 
                class="w-full py-4 bg-blue-600 hover:bg-blue-500 text-white font-black text-sm uppercase tracking-widest rounded-2xl transition-all active:scale-[0.98] shadow-lg shadow-blue-900/20">
                Execute Command
            </button>

            <div class="space-y-2">
                <label class="text-[10px] text-gray-500 uppercase font-bold tracking-widest ml-1">Process Logs</label>
                <div id="logArea" class="w-full h-48 bg-black/60 border border-gray-800 rounded-2xl p-4 font-mono text-[11px] text-blue-300 overflow-y-auto space-y-1">
                    <div>> System Online. Awaiting architecture instructions...</div>
                </div>
            </div>
        </main>

        <footer class="text-center">
            <p class="text-[10px] text-gray-600 font-mono italic">Connected to Groq 70B Llama-3.3 Engine</p>
        </footer>
    </div>

    <!-- The Brain Link -->
    <script src="brain.js?v=400"></script>
    <!-- Hello World Comment -->
    <!-- Hello, World! -->
</body>
</html>

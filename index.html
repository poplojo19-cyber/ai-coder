<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OpenClaw Mobile</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0d1117] text-gray-200 p-4 font-sans">
    <div class="max-w-xl mx-auto">
        <header class="flex items-center gap-3 mb-8">
            <div class="w-3 h-3 bg-green-500 rounded-full animate-pulse"></div>
            <h1 class="text-xl font-mono tracking-tighter">OPENCLAW_v2</h1>
        </header>

        <div id="logArea" class="h-64 overflow-y-auto mb-6 p-4 bg-black/50 border border-gray-800 rounded-lg text-xs font-mono text-blue-400 space-y-2">
            <div>> System initialized. I can see all your files.</div>
        </div>

        <div class="space-y-4">
            <textarea id="promptInput" rows="4" placeholder="What should we build today?" 
                class="w-full p-4 bg-[#161b22] border border-gray-700 rounded-xl focus:border-blue-500 outline-none transition-all"></textarea>
            
            <button id="runBtn" class="w-full py-4 bg-white text-black font-bold rounded-xl active:scale-95 transition-transform">
                SEND REQUEST
            </button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>

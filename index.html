<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Coder Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-purple-500 text-gray-100 p-5 font-sans">

    <h1 class="text-xl font-bold text-blue-500 mb-6">🤖 AI BACKEND CODER</h1>

    <div class="space-y-4">
        <div>
            <label class="text-xs text-gray-500 uppercase font-bold">File Path</label>
            <input type="text" id="filePath" value="index.html" class="w-full p-3 bg-gray-900 rounded border border-gray-800 text-white outline-none focus:border-blue-500">
        </div>
        
        <div>
            <label class="text-xs text-gray-500 uppercase font-bold">Prompt</label>
            <textarea id="promptInput" rows="5" placeholder="What should I change?" class="w-full p-3 bg-gray-900 rounded border border-gray-800 text-white outline-none focus:border-blue-500"></textarea>
        </div>
        
        <button id="runBtn" class="w-full py-4 bg-blue-600 hover:bg-blue-500 rounded font-bold text-white transition-all active:scale-95 shadow-lg shadow-blue-900/20">
            EXECUTE CHANGE
        </button>
    </div>

    <div class="mt-8">
        <label class="text-xs text-gray-500 uppercase font-bold tracking-widest">System Logs</label>
        <div id="logArea" class="mt-2 bg-gray-900/50 p-4 rounded border border-gray-800 h-64 overflow-y-auto text-sm font-mono text-green-500 whitespace-pre-wrap">
Ready for command...</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
